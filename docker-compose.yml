services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-medusa}
      POSTGRES_USER: ${POSTGRES_USER:-medusa}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-medusa}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 20

  redis:
    image: redis:7
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 20

  medusa:
    build:
      context: ./apps/medusa
      dockerfile: Dockerfile.dev
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      MEDUSA_TELEMETRY_DISABLED: "true"
      LOG_OUTPUT_PATH: /workspace/logs/medusa-json.log
      LOG_CAPTURE_BODIES: ${LOG_CAPTURE_BODIES:-false}
    ports:
      - "9000:9000"
    volumes:
      - ./apps/medusa:/workspace
      - ./.env:/workspace/apps/backend/.env
      - ./logs:/workspace/logs
      - medusa_node_modules:/workspace/node_modules
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "node -e \"fetch('http://127.0.0.1:9000/health').then((response) => process.exit(response.ok ? 0 : 1)).catch(() => process.exit(1))\"",
        ]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 30s

volumes:
  postgres_data:
  redis_data:
  medusa_node_modules:
