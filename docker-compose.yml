# Bound container stdout logs so a long/repeated traffic run can't grow the
# Docker data disk without limit (default json-file driver is unbounded).
x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "3"

services:
  postgres:
    logging: *default-logging
    image: postgres:15
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-medusa}
      POSTGRES_USER: ${POSTGRES_USER:-medusa}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-medusa}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 20

  platform-postgres:
    logging: *default-logging
    image: postgres:15
    environment:
      POSTGRES_DB: ${PLATFORM_POSTGRES_DB:-behavior_platform}
      POSTGRES_USER: ${PLATFORM_POSTGRES_USER:-platform}
      POSTGRES_PASSWORD: ${PLATFORM_POSTGRES_PASSWORD:-platform}
    ports:
      - "${PLATFORM_POSTGRES_PORT:-5433}:5432"
    volumes:
      - platform_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 20

  redis:
    logging: *default-logging
    image: redis:7
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 20

  minio:
    logging: *default-logging
    image: minio/minio:RELEASE.2025-04-22T22-12-26Z
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    ports:
      - "${MINIO_PORT:-9100}:9000"
      - "${MINIO_CONSOLE_PORT:-9101}:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 20

  minio-init:
    image: minio/mc:RELEASE.2025-04-16T18-13-26Z
    depends_on:
      minio:
        condition: service_healthy
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
      S3_BUCKET: ${S3_BUCKET:-platwright}
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 $$MINIO_ROOT_USER $$MINIO_ROOT_PASSWORD;
      mc mb --ignore-existing local/$$S3_BUCKET;
      mc version enable local/$$S3_BUCKET;
      "

  medusa:
    logging: *default-logging
    build:
      context: ./apps/medusa
      dockerfile: Dockerfile.dev
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      MEDUSA_TELEMETRY_DISABLED: "true"
      LOG_OUTPUT_PATH: /workspace/logs/medusa-json.log
      LOG_CAPTURE_BODIES: ${LOG_CAPTURE_BODIES:-false}
      LOG_CAPTURE_RAW_BODIES: ${LOG_CAPTURE_RAW_BODIES:-false}
      # Phase 12 regression demo toggle: OFF unless set (reversible by env var).
      REGRESSION_DEMO: ${REGRESSION_DEMO:-}
    ports:
      - "9000:9000"
    volumes:
      - ./apps/medusa:/workspace
      - ./.env:/workspace/apps/backend/.env
      - ./logs:/workspace/logs
      - medusa_node_modules:/workspace/node_modules
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "node -e \"fetch('http://127.0.0.1:9000/health').then((response) => process.exit(response.ok ? 0 : 1)).catch(() => process.exit(1))\"",
        ]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 30s

  storefront:
    image: node:22-alpine
    working_dir: /workspace/apps/storefront
    env_file:
      - .env
    depends_on:
      medusa:
        condition: service_healthy
    environment:
      MEDUSA_BACKEND_URL: http://medusa:9000
    command: sh -c "test -d node_modules/.bin || npm ci && npm run dev"
    ports:
      - "8000:8000"
    volumes:
      - ./apps/storefront:/workspace/apps/storefront
      - ./.env:/workspace/.env
      - storefront_node_modules:/workspace/apps/storefront/node_modules

  platform-dashboard:
    image: node:22-alpine
    working_dir: /workspace/apps/platform-dashboard
    env_file:
      - .env
    depends_on:
      medusa:
        condition: service_healthy
      platform-postgres:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
      filebeat:
        condition: service_started
    environment:
      MEDUSA_BACKEND_URL: http://medusa:9000
      STORAGE_BACKEND: ${STORAGE_BACKEND:-local}
      # Platform metadata DB — kept distinct from the SUT's DATABASE_URL (Medusa),
      # which arrives via env_file and is unused by the dashboard.
      PLATFORM_DATABASE_URL: postgres://${PLATFORM_POSTGRES_USER:-platform}:${PLATFORM_POSTGRES_PASSWORD:-platform}@platform-postgres:5432/${PLATFORM_POSTGRES_DB:-behavior_platform}
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
      S3_BUCKET: ${S3_BUCKET:-platwright}
      S3_FORCE_PATH_STYLE: "true"
      ELASTICSEARCH_URL: http://elasticsearch:9200
      ELASTICSEARCH_INDEX: ${ELASTICSEARCH_INDEX:-behavior-logs-*}
      # The generated specs are API-only Playwright (request context) — they never launch a
      # browser, so skip the browser download on install. Saves time/space and dodges the fact
      # that Playwright's browser binaries aren't supported on alpine/musl.
      PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: "1"
      # The /api/pipeline/run "repair" job shells out to the `claude` CLI (script-generator's
      # resolver-agent). Install it globally under a persisted prefix and put it on PATH so the
      # binary survives restarts. ANTHROPIC_API_KEY must be set in .env (loaded via env_file) for
      # the CLI to authenticate; without it, repair fails cleanly while mine/generate/triage work.
      NPM_CONFIG_PREFIX: /workspace/.npm-global
      PATH: /workspace/.npm-global/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
    # On first boot, install every dep the browser-driven pipeline needs in-container, then start
    # the dashboard. Each step is guarded so restarts skip it; deps live in named volumes (below)
    # so the musl binaries are correct. curl is for the repair agent's read-only SUT exploration
    # (Bash(curl:*)); the claude CLI backs the repair job. mine→generate→triage need behavior-engine,
    # script-generator, golden, and test-runner installed; generate/repair import services/golden.
    command: >-
      sh -c "(command -v curl >/dev/null || apk add --no-cache curl)
      && (test -d node_modules/.bin || npm ci)
      && (test -d /workspace/generated-tests/node_modules/.bin || npm --prefix /workspace/generated-tests ci)
      && (test -d /workspace/services/test-runner/node_modules/.bin || npm --prefix /workspace/services/test-runner ci)
      && (test -d /workspace/services/log-ingestion/node_modules/.bin || npm --prefix /workspace/services/log-ingestion ci)
      && (test -d /workspace/services/behavior-engine/node_modules/.bin || npm --prefix /workspace/services/behavior-engine ci)
      && (test -d /workspace/services/script-generator/node_modules/.bin || npm --prefix /workspace/services/script-generator ci)
      && (test -d /workspace/services/golden/node_modules/.bin || npm --prefix /workspace/services/golden ci)
      && (test -d /workspace/packages/storage/node_modules/.bin || npm --prefix /workspace/packages/storage ci)
      && (command -v claude >/dev/null || npm i -g @anthropic-ai/claude-code)
      && npm --prefix /workspace run storage:bootstrap
      && npm run dev"
    ports:
      - "5173:5173"
    volumes:
      - ./apps/platform-dashboard:/workspace/apps/platform-dashboard
      - ./.env:/workspace/.env
      # /api/tests/run shells out to `npm run test:<target>` (root package.json) which drives the
      # test-runner; mount both so the run resolves in-container.
      - ./package.json:/workspace/package.json:ro
      - ./services/test-runner:/workspace/services/test-runner
      - ./services/log-ingestion:/workspace/services/log-ingestion
      # The pipeline jobs run these services in-container: mine (behavior-engine, writes its
      # data/candidates — hence RW, not the old :ro data-only mount), generate + repair
      # (script-generator, which imports services/golden for the OAS). HITL review (/api/flows)
      # reads behavior-engine/data via the same mount; findRepoRoot() resolves the repo root.
      - ./services/behavior-engine:/workspace/services/behavior-engine
      - ./services/script-generator:/workspace/services/script-generator
      - ./services/golden:/workspace/services/golden
      - ./packages:/workspace/packages
      # RW (was :ro): the run writes Playwright results + reports, and the delete button
      # unlinks specs under generated-tests/.
      - ./generated-tests:/workspace/generated-tests
      # assert-golden.ts resolves goldens at /workspace/golden-responses (../../ from
      # generated-tests/_golden). Without this mount loadGoldens() sees no dir and every
      # assertGolden() fails closed with "Missing golden schema".
      - ./golden-responses:/workspace/golden-responses
      - ./reports:/workspace/reports
      - ./data:/workspace/data
      - platform_dashboard_node_modules:/workspace/apps/platform-dashboard/node_modules
      # Installed in-container (correct musl binaries for tsx/esbuild + @playwright/test) and
      # persisted across restarts; these shadow any host node_modules.
      - generated_tests_node_modules:/workspace/generated-tests/node_modules
      - test_runner_node_modules:/workspace/services/test-runner/node_modules
      - log_ingestion_node_modules:/workspace/services/log-ingestion/node_modules
      - behavior_engine_node_modules:/workspace/services/behavior-engine/node_modules
      - script_generator_node_modules:/workspace/services/script-generator/node_modules
      - golden_node_modules:/workspace/services/golden/node_modules
      - storage_node_modules:/workspace/packages/storage/node_modules
      # The globally-installed `claude` CLI (NPM_CONFIG_PREFIX) for the repair job, persisted.
      - claude_cli_global:/workspace/.npm-global

  platform-db-backup:
    profiles: ["backups"]
    image: postgres:15
    depends_on:
      platform-postgres:
        condition: service_healthy
    environment:
      PGPASSWORD: ${PLATFORM_POSTGRES_PASSWORD:-platform}
      BACKUP_RETENTION_DAYS: ${BACKUP_RETENTION_DAYS:-7}
    volumes:
      - platform_postgres_backups:/backups
    entrypoint: >
      /bin/sh -c "while true; do
      stamp=$$(date -u +%Y%m%dT%H%M%SZ);
      pg_dump -h platform-postgres -U ${PLATFORM_POSTGRES_USER:-platform}
      -d ${PLATFORM_POSTGRES_DB:-behavior_platform}
      -Fc -f /backups/platform-$$stamp.dump;
      find /backups -type f -mtime +$$BACKUP_RETENTION_DAYS -delete;
      sleep 86400;
      done"

  object-store-backup:
    profiles: ["backups"]
    image: minio/mc:RELEASE.2025-04-16T18-13-26Z
    depends_on:
      minio-init:
        condition: service_completed_successfully
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
      S3_BUCKET: ${S3_BUCKET:-platwright}
      BACKUP_RETENTION_DAYS: ${BACKUP_RETENTION_DAYS:-7}
    volumes:
      - minio_backups:/backups
    entrypoint: >
      /bin/sh -c "mc alias set local http://minio:9000
      $$MINIO_ROOT_USER $$MINIO_ROOT_PASSWORD;
      while true; do
      stamp=$$(date -u +%Y%m%dT%H%M%SZ);
      mkdir -p /backups/$$stamp;
      mc mirror --overwrite local/$$S3_BUCKET /backups/$$stamp;
      find /backups -mindepth 1 -maxdepth 1 -type d
      -mtime +$$BACKUP_RETENTION_DAYS -exec rm -rf {} +;
      sleep 86400;
      done"

  elasticsearch:
    logging: *default-logging
    image: docker.elastic.co/elasticsearch/elasticsearch:8.13.4
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - xpack.security.enrollment.enabled=false
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
    ports:
      - "9200:9200"
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data
      - ./infra/elasticsearch/elasticsearch.yml:/usr/share/elasticsearch/config/elasticsearch.yml:ro
    healthcheck:
      test: ["CMD-SHELL", "curl -s http://localhost:9200/_cluster/health | grep -q '\"status\":\"green\"\\|\"status\":\"yellow\"'"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 60s

  elasticsearch-init:
    image: curlimages/curl:8.12.1
    depends_on:
      elasticsearch:
        condition: service_healthy
    volumes:
      - ./infra/elasticsearch/behavior-logs-ilm-policy.json:/config/ilm-policy.json:ro
      - ./infra/elasticsearch/behavior-logs-template.json:/config/index-template.json:ro
    entrypoint: >
      /bin/sh -c "
      curl --fail --silent --show-error
      -X PUT http://elasticsearch:9200/_ilm/policy/behavior-logs-retention
      -H 'Content-Type: application/json'
      --data-binary @/config/ilm-policy.json;
      curl --fail --silent --show-error
      -X PUT http://elasticsearch:9200/_index_template/behavior-logs
      -H 'Content-Type: application/json'
      --data-binary @/config/index-template.json;
      curl --fail --silent --show-error
      -X PUT 'http://elasticsearch:9200/behavior-logs-*/_settings?allow_no_indices=true'
      -H 'Content-Type: application/json'
      --data '{\"index.lifecycle.name\":\"behavior-logs-retention\"}';
      "

  kibana:
    profiles: ["elk"]
    image: docker.elastic.co/kibana/kibana:8.13.4
    ports:
      - "5601:5601"
    volumes:
      - ./infra/kibana/kibana.yml:/usr/share/kibana/config/kibana.yml:ro
    depends_on:
      elasticsearch:
        condition: service_healthy

  logstash:
    logging: *default-logging
    image: docker.elastic.co/logstash/logstash:8.13.4
    environment:
      - LS_JAVA_OPTS=-Xms256m -Xmx512m
    volumes:
      - ./infra/logstash/logstash.yml:/usr/share/logstash/config/logstash.yml:ro
      - ./infra/logstash/pipeline:/usr/share/logstash/pipeline:ro
      - ./logs:/workspace/logs:ro
    depends_on:
      elasticsearch-init:
        condition: service_completed_successfully

  filebeat:
    logging: *default-logging
    image: docker.elastic.co/beats/filebeat:8.13.4
    user: root
    command: filebeat -e --strict.perms=false
    volumes:
      - ./infra/filebeat/filebeat.yml:/usr/share/filebeat/filebeat.yml:ro
      - ./logs:/workspace/logs:ro
      - filebeat_registry:/usr/share/filebeat/data
    depends_on:
      logstash:
        condition: service_started

volumes:
  postgres_data:
  platform_postgres_data:
  redis_data:
  minio_data:
  medusa_node_modules:
  storefront_node_modules:
  platform_dashboard_node_modules:
  generated_tests_node_modules:
  test_runner_node_modules:
  log_ingestion_node_modules:
  behavior_engine_node_modules:
  script_generator_node_modules:
  golden_node_modules:
  storage_node_modules:
  claude_cli_global:
  platform_postgres_backups:
  minio_backups:
  elasticsearch_data:
  filebeat_registry:
