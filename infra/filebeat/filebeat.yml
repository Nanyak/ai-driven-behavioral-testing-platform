filebeat.inputs:
  # Read Medusa's structured log file directly (complete, masked JSON lines).
  # NOT container stdout: Docker's json-file driver splits lines >16KB, which
  # corrupts bodies-on payloads, and tailing all containers re-ingests
  # Logstash's own parse-error logs into a feedback loop. The file holds whole
  # lines and only Medusa's output, so neither problem can occur.
  - type: filestream
    id: medusa-json
    paths:
      - /workspace/logs/medusa-json.log

# Keep Filebeat minimal: it only ships the raw line in `message`.
# Logstash decodes the JSON (separation of concerns). We do NOT decode JSON here.
output.logstash:
  hosts: ["logstash:5044"]

# Persist the registry in a named volume so Filebeat does not re-ship lines
# after a restart.
filebeat.registry.path: /usr/share/filebeat/data/registry

logging.level: info
