input {
  beats {
    port => 5044
    # ecs_compatibility disabled so Logstash does not inject an ECS
    # `[event][original]` object, which would collide with our semantic string
    # `event` field (e.g. "cart_item_added") and fail every line.
    ecs_compatibility => "disabled"
  }
}

filter {
  # Parse the raw stdout line shipped by Filebeat in `message`.
  json {
    source => "message"
    ecs_compatibility => "disabled"
  }

  # Drop every line that is not one of our structured Medusa logs. Framework
  # noise (plain text / other JSON) lacks a top-level "source":"medusa".
  if [source] != "medusa" {
    drop {}
  }

  # Strip Filebeat/Beats-added metadata so the ES doc keeps the original
  # flat top-level schema (service, event, endpoint, status, ...).
  mutate {
    remove_field => ["@version", "message", "log", "host", "agent", "ecs", "input", "container", "stream", "tags"]
  }
}

output {
  elasticsearch {
    hosts => ["http://elasticsearch:9200"]
    index => "behavior-logs-%{+YYYY.MM.dd}"
  }
}
